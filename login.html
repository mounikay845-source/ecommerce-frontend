<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | MyShop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: https://fakestoreapi.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src 'self' https://cdnjs.cloudflare.com https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com;">
    
    <link rel="stylesheet" href="style/variables.css">
    <link rel="stylesheet" href="style/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body {
            background: radial-gradient(circle at bottom right, var(--primary-color), var(--bg-color) 40%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .auth-container {
            background: var(--surface-color);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--surface-border);
            padding: 2.5rem 2rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: fadeUp 0.6s ease-out forwards;
        }

        .avatar {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            color: white;
            margin: 0 auto 1.5rem auto;
            box-shadow: var(--shadow-md);
        }

        h2 {
            margin-bottom: 1.5rem;
            color: var(--text-color);
            font-weight: 700;
        }

        .input-group {
            position: relative;
            margin-bottom: 1.25rem;
            text-align: left;
        }

        .input-group i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .input-group input {
            width: 100%;
            padding: 0.8rem 1rem 0.8rem 2.5rem;
            border: 1px solid var(--surface-border);
            border-radius: var(--radius-full);
            background: rgba(255, 255, 255, 0.5);
            color: var(--text-color);
            font-size: 1rem;
            font-family: var(--font-main);
            outline: none;
            transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
        }

        .input-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
            background: white;
        }

        .auth-btn {
            width: 100%;
            padding: 0.8rem;
            border: none;
            border-radius: var(--radius-full);
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform var(--transition-bounce), box-shadow var(--transition-fast);
            margin-top: 1rem;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(99, 102, 241, 0.4);
        }

        .auth-links {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .auth-links a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            transition: color var(--transition-fast);
        }

        .auth-links a:hover {
            color: var(--secondary-color);
        }

        .error-msg {
            color: var(--danger-color);
            font-size: 0.85rem;
            margin-top: 0.25rem;
            display: none;
            margin-left: 1rem;
        }
        
        #globalAuthError {
            color: white;
            background: var(--danger-color);
            padding: 0.5rem;
            border-radius: var(--radius-md);
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body class="light-theme">

<div class="auth-container">
    <div class="avatar"><i class="fa fa-user"></i></div>
    <h2>Welcome Back</h2>
    
    <div id="globalAuthError"></div>

    <form id="loginForm" onsubmit="loginUser(event)">
        <div class="input-group">
            <i class="fa fa-envelope"></i>
            <input type="email" id="email" placeholder="Email Address" required>
        </div>
        <div class="input-group">
            <i class="fa fa-lock"></i>
            <input type="password" id="password" placeholder="Password" required>
        </div>

        <button type="submit" class="auth-btn">Sign In</button>
    </form>

    <div class="auth-links">
        <p style="margin-bottom: 0.5rem;"><a href="forgot.html">Forgot Password?</a></p>
        <p>Don't have an account? <a href="signup.html">Create Account</a></p>
    </div>
</div>

<script src="scripts/auth.js"></script>
</body>
</html>
