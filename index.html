<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>E-Commerce Website</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="style/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background-color: #222;
            color: white;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        nav ul li a {
            text-decoration: none;
            color: white;
            font-size: 16px;
        }

        .search-bar input {
            padding: 5px 10px;
            border-radius: 3px;
            border: none;
        }

        .wishlist-icon {
            position: relative;
            cursor: pointer;
        }

        .wishlist-icon span {
            position: absolute;
            top: -8px;
            right: -10px;
            background: red;
            color: white;
            font-size: 12px;
            padding: 2px 6px;
            border-radius: 50%;
        }

        .cart {
            position: relative;
        }

        .cart span {
            position: absolute;
            top: -8px;
            right: -10px;
            background: red;
            color: white;
            font-size: 12px;
            padding: 2px 6px;
            border-radius: 50%;
        }

        .hamburger {
            display: none;
            font-size: 22px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            nav ul { display: none; }
            .search-bar { display: none; }
            .hamburger { display: block; }
        }
    </style>
</head>

<body>

<!-- ================= HEADER ================= -->
<header>
    <div class="logo">MyShop</div>

    <nav>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#products">Products</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <div class="search-bar">
        <input type="text" placeholder="Search products...">
    </div>

    <div class="wishlist-icon">
        <i class="fa fa-heart"></i>
        <span id="wishlistCount">0</span>
    </div>
   
    <div class="cart">
        <img src="assets/cart1.webp" alt="Cart" class="cart-img">
        <span id="cartCount">0</span>
    </div>

    <div class="hamburger">☰</div>
</header>

<!-- ================= HERO SECTION ================= -->
<section class="hero">
    <div class="hero-content">
        <h1>Biggest Sale of the Year!</h1>
        <p>Up to 70% off on selected products. Shop now before it ends!</p>
        <a href="#products" class="hero-btn">Shop Now</a>
    </div>
</section>

<!-- ================= CATEGORY SECTION ================= -->
<section class="category-icons-section">
    <div class="category-icons">

        <div class="category-item" onclick="filterCategory('women\'s clothing')">
            <img src="assets/ethnic.webp">
            <p>Ethnic Wear</p>
        </div>

        <div class="category-item" onclick="filterCategory('men\'s clothing')">
            <img src="assets/men.webp">
            <p>Menswear</p>
        </div>

        <div class="category-item" onclick="filterCategory('electronics')">
            <img src="assets/shoes.webp">
            <p>Electronics</p>
        </div>

        <div class="category-item" onclick="filterCategory('jewelery')">
            <img src="assets/home_decore.webp">
            <p>Jewelry</p>
        </div>

        <div class="category-item" onclick="displayProducts(allProducts)">
            <img src="assets/kitchen.webp">
            <p>All Products</p>
        </div>

    </div>
</section>

<!-- ================= PRODUCTS SECTION ================= -->
<section class="products-section" id="products">
    <h2>Our Products</h2>

    <div id="loading">Loading products...</div>
    <div id="errorMessage"></div>

    <div id="productGrid" class="product-grid"></div>
</section>

<!-- ===== Add To Cart Popup ===== -->
<div id="cartPopup" class="cart-popup"></div>

<!-- ================= SCRIPT ================= -->
<script src="scripts/app.js"></script>

</body>
</html>
