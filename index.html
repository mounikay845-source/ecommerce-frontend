 <nav id="navbar">
<ul class="nav-links">

    <button onclick="logout()" class="logout-btn">Logout</button>

<i class="fa fa-bars"></i>

<!-- ================= HERO SECTION ================= -->
<section class="hero">

        <a href="#products" class="hero-btn">Shop Now</a>
    </div>
</section>

<!-- ================= CATEGORY SECTION ================= -->
<section class="category-icons-section">
    <div class="category-icons">

        <div class="category-item" onclick="filterCategory('women\'s clothing')">
    <img src="assets/ethnic.webp" alt="Ethnic Wear" loading="lazy" decoding="async">
    <p>Ethnic Wear</p>
</div>

        
        <div class="category-item" onclick="filterCategory('women\'s clothing')">
    <img src="assets/men.webp" alt="Ethnic Wear" loading="lazy" decoding="async">
     <p>Menswear</p>
</div>

        <div class="category-item" onclick="filterCategory('electronics')">
    <img src="assets\elec.webp" alt="Electronics" loading="lazy" decoding="async">
     <p>Electronics</p>
</div>
         
        <div class="category-item" onclick="filterCategory('jewelery')">
    <img src="assets/jewellery.webp" alt="jewellery" loading="lazy" decoding="async">
      <p>Jewelry</p>
</div>

        
        <div class="category-item" onclick="filterCategory('allProducts')">
    <img src="assets/all.webp" alt="all products" loading="lazy" decoding="async">
    <p>All Products</p>
</div>

    </div>
</section>

<!-- ================= PRODUCTS SECTION ================= -->

    <div id="productGrid" class="product-grid"></div>
</section>

<!-- ===== Add To Cart Popup ===== -->
<div id="cartPopup" class="popup"></div>
<script>

function toggleMenu(){

const nav=document.getElementById("navbar");

nav.classList.toggle("show");

}

</script>
<script>
document.addEventListener("DOMContentLoaded", function(){

const lazyImages = document.querySelectorAll("img[loading='lazy']");

if("IntersectionObserver" in window){

let observer = new IntersectionObserver(function(entries, observer){

entries.forEach(function(entry){

if(entry.isIntersecting){

let img = entry.target;
img.src = img.dataset.src || img.src;

observer.unobserve(img);

}

});

});

lazyImages.forEach(function(img){
observer.observe(img);
});

}

});
</script>
<script>
const hamburger = document.getElementById("hamburger");
const navMenu = document.getElementById("navMenu");

hamburger.addEventListener("click", () => {
    navMenu.classList.toggle("active");
});
</script>

<script src="scripts/app.js" defer></script>
<script src="scripts/auth.js" defer></script>
