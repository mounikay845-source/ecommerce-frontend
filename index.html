<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>E-Commerce Website</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="style/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:#222;
color:white;
}

/* LOGO */
.logo{
font-size:24px;
font-weight:bold;
}

/* NAVIGATION */
nav ul{
list-style:none;
display:flex;
gap:20px;
}

nav ul li a{
text-decoration:none;
color:white;
font-size:16px;
transition:0.3s;
}

nav ul li a:hover{
color:orange;
}

/* SEARCH BAR */
.search-bar input{
padding:5px 10px;
border-radius:3px;
border:none;
}

/* WISHLIST */
.wishlist-icon{
position:relative;
cursor:pointer;
}

.wishlist-icon span{
position:absolute;
top:-8px;
right:-10px;
background:red;
color:white;
font-size:12px;
padding:2px 6px;
border-radius:50%;
}

/* CART */
.cart{
position:relative;
}

.cart span{
position:absolute;
top:-8px;
right:-10px;
background:red;
color:white;
font-size:12px;
padding:2px 6px;
border-radius:50%;
}

/* LOGOUT BUTTON */
.logout-btn{
cursor:pointer;
padding:6px 10px;
border:none;
background:#ff4d4d;
color:white;
border-radius:4px;
}

/* HAMBURGER ICON */
.hamburger{
display:none;
font-size:22px;
cursor:pointer;
}

/* MOBILE RESPONSIVE */
@media (max-width:768px){

nav{
position:absolute;
top:70px;
left:0;
width:100%;
background:#333;
display:none;
}

nav ul{
flex-direction:column;
text-align:center;
padding:20px;
}

nav ul li{
margin:10px 0;
}

nav.show{
display:block;
}

.search-bar{
display:none;
}

.hamburger{
display:block;
}

}

</style>
</head>

<body>

<!-- ================= HEADER ================= -->
<header>
    <div class="logo">MyShop</div>

 <nav id="navbar">
<ul class="nav-links">

<li><a href="#">Home</a></li>
<li><a href="#products">Products</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Contact</a></li>
<li><a href="login.html">Login</a></li>
<li><a href="signup.html">Signup</a></li>

</ul>
</nav>
    <button onclick="logout()" class="logout-btn">Logout</button>

    <div class="search-bar">
        <input type="text" placeholder="Search products...">
    </div>

    <div class="wishlist-icon">
        <i class="fa fa-heart"></i>
        <span id="wishlistCount">0</span>
    </div>
   
    <a href="cart.html" class="cart">
    <img src="assets/cart1.webp" alt="Cart" class="cart-img" >
    <span id="cartCount">0</span>
</a>
<div class="hamburger" onclick="toggleMenu()">
<i class="fa fa-bars"></i>
</div>
</header>

<!-- ================= HERO SECTION ================= -->
<section class="hero">
    <picture>
        <source media="(min-width: 1024px)" srcset="assets\big.avif" type="image/avif">
        <source media="(min-width: 600px)" srcset="assets\big.avif" type="image/avif">
        <img src="assets\big.avif" alt="Biggest Sale" loading="lazy"class="hero-bg-img" loading="eager">
    </picture>
    <div class="hero-content">
        <h1>Biggest Sale of the Year!</h1>
        <p>Up to 70% off on selected products. Shop now before it ends!</p>
        <a href="#products" class="hero-btn">Shop Now</a>
    </div>
</section>

<!-- ================= CATEGORY SECTION ================= -->
<section class="category-icons-section">
    <div class="category-icons">

        <div class="category-item" onclick="filterCategory('women\'s clothing')">
    <img src="assets/ethnic.webp" alt="Ethnic Wear" loading="lazy" decoding="async">
    <p>Ethnic Wear</p>
</div>

        
        <div class="category-item" onclick="filterCategory('women\'s clothing')">
    <img src="assets/men.webp" alt="Ethnic Wear" loading="lazy" decoding="async">
     <p>Menswear</p>
</div>

        <div class="category-item" onclick="filterCategory('electronics')">
    <img src="assets\elec.webp" alt="Electronics" loading="lazy" decoding="async">
     <p>Electronics</p>
</div>
         
        <div class="category-item" onclick="filterCategory('jewelery')">
    <img src="assets/jewellery.webp" alt="jewellery" loading="lazy" decoding="async">
      <p>Jewelry</p>
</div>

        
        <div class="category-item" onclick="filterCategory('allProducts')">
    <img src="assets/all.webp" alt="all products" loading="lazy" decoding="async">
    <p>All Products</p>
</div>

    </div>
</section>

<!-- ================= PRODUCTS SECTION ================= -->
<section class="products-section" id="products">
    <h2>Our Products</h2>

    <div id="loading">Loading products...</div>
    <div id="errorMessage"></div>

    <div id="productGrid" class="product-grid"></div>
</section>

<!-- ===== Add To Cart Popup ===== -->
<div id="cartPopup" class="popup"></div>
<script>

function toggleMenu(){

const nav=document.getElementById("navbar");

nav.classList.toggle("show");

}

</script>
<!-- ================= SCRIPT ================= -->
<script src="scripts/app.js"></script>
<script src="scripts/auth.js"></script>


</body>
</html>
