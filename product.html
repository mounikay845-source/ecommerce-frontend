<!DOCTYPE html>
<html>
<head>
    <title>Product Details</title>
    <link rel="stylesheet" href="assets/style/main.css">
</head>

<body>

<header>
    <h1><a href="index.html">My Store</a></h1>
</header>

<div id="loading">Loading product...</div>

<section class="product-detail-container">
    <div class="product-detail">
        <img id="detail-image">

        <div class="product-info">
            <h2 id="detail-title"></h2>
            <p id="detail-description"></p>
            <h3 id="detail-price"></h3>
            <a href="cart.html" class="cart">
    🛒 <span id="cartCount">0</span>
</a>

            <button class="btn" id="detail-cart-btn">
                Add to Cart
            </button>

            <button class="wishlist-btn" id="detail-wishlist-btn">
                ❤️
            </button>
        </div>
    </div>
</section>

<div id="cartPopup" class="popup"></div>

<script src="product.js"></script>
</body>
</html>
