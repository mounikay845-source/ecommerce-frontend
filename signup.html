<!DOCTYPE html>
<html>
<head>
<title>Signup</title>
<style>
        .body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #de88c4, #c3e0e0);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: rgb(239, 208, 208);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 350px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102,126,234,0.5);
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            border: none;
            background: #667eea;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }
        body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: #e5e5e5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Main Box */
.login-box {
    width: 350px;
    background: #56657a;
    padding: 40px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    color: white;
}

/* Top Avatar */
.avatar {
    width: 80px;
    height: 80px;
    background: #b6e0e3;
    border-radius: 50%;
    margin-top:50px;
    margin: -30px auto 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 30px;
}
/* Input Fields */
.input-box {
    position: relative;
    margin: 20px 0;
}

.input-box i {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    color: #642424;
}

.input-box input {
    width: 85%;
    padding: 12px 12px 12px 40px;
    border: none;
    border-radius: 25px;
    outline: none;
    background: #d9ef96;
    color: rgb(24, 21, 21);
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 25px;
    background: linear-gradient(to right, #4facfe, #00f2fe);
    color: white;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    opacity: 0.9;
}

.forgot {
    margin-top: 15px;
    font-size: 14px;
    color: #ccc;
}
        
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<link rel="stylesheet" href="auth.css">

</head>

<body class="body">

<div class="container">
     <div class="avatar">
           <i class="fa fa-user"></i>
        </div>
    <h2>Create Account</h2>

   <form onsubmit="signup(); return false;">

<div class="input-box">
<i class="fa fa-user"></i>
<input type="text" id="name" placeholder="Username..." required>
</div>

<div class="input-box">
<i class="fa fa-envelope"></i>
<input type="email" id="email" placeholder="Enter Email..." required>
</div>

<div class="input-box">
<i class="fa fa-lock"></i>
<input type="password" id="password" placeholder="Password..." required>
</div>

<button type="button" onclick="signup()">Signup</button>

</form>
<br>

    <div class="div">
        <center>
        Already have an account? <a href="login.html">Login</a>
        </center>
    </div>
</div>

<script src="scripts/auth.js"></script>

</body>
</html>
